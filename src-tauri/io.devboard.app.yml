app-id: io.devboard.app
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: devboard

build-options:
  append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/devboard/cargo
    npm_config_cache: /run/build/devboard/npm-cache

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: webkit2gtk-4.1
    disabled: false
    sources:
      - type: git
        url: https://github.com/nicowillis/flatpak-webkit2gtk-4.1.git

  - name: devboard
    buildsystem: simple
    build-options:
      env:
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      # Install npm dependencies (pre-vendored for offline build)
      - npm ci --offline
      # Build frontend
      - npm run build
      # Build Tauri backend
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      # Install binary
      - install -Dm755 src-tauri/target/release/devboard /app/bin/devboard
      # Install desktop entry
      - install -Dm644 flatpak/io.devboard.app.desktop /app/share/applications/io.devboard.app.desktop
      # Install icon
      - install -Dm644 public/favicon.ico /app/share/icons/hicolor/256x256/apps/io.devboard.app.png
    sources:
      - type: git
        url: https://github.com/YOUR_USERNAME/devboard.git
        branch: main
      # Generated by flatpak-node-generator and flatpak-cargo-generator:
      # - type: file
      #   path: generated-sources/npm/generated-sources.json
      # - type: file
      #   path: generated-sources/cargo/generated-sources.json
