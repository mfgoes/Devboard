name: Build DevBoard

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.artifact }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2t64

      - name: Install npm dependencies
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Create fixed-name artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/devboard_*.AppImage DevBoard-Linux.AppImage

      - name: Create fixed-name artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: cp "src-tauri/target/${{ matrix.target }}/release/bundle/dmg/DevBoard_"*.dmg "DevBoard-macOS.dmg"

      - name: Create fixed-name artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/DevBoard_*-setup.exe DevBoard-Windows.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devboard-${{ matrix.artifact }}
          path: |
            DevBoard-macOS.dmg
            DevBoard-Windows.exe
            DevBoard-Linux.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: warn

  # Create a GitHub Release when a version tag is pushed
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
